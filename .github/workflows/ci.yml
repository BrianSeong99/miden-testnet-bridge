name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo build
        run: cargo build --locked
      - name: cargo test
        run: cargo test --locked --lib --test evm --test hardening --test lifecycle --test miden_bridge --test miden_node --test state

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: lint
        run: npm run lint
      - name: build
        run: npm run build

  e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run E2E suite
        run: make e2e
        env:
          RUN_E2E: "1"
          EVM_RPC_URL: ${{ secrets.SEPOLIA_EVM_RPC_URL }}
          EVM_CHAIN_ID: "11155111"
          SOLVER_PRIVATE_KEY: ${{ secrets.SEPOLIA_SOLVER_PRIVATE_KEY }}
          DEMO_EVM_FUNDED_PRIVATE_KEY: ${{ secrets.SEPOLIA_DEMO_EVM_FUNDED_PRIVATE_KEY }}
          MIDEN_MASTER_SEED_HEX: ${{ secrets.MIDEN_MASTER_SEED_HEX }}
      - name: Capture bridge logs
        if: failure()
        run: docker compose logs bridge > bridge.log || true
      - name: Upload bridge logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-log
          path: bridge.log
      - name: Stop compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans
