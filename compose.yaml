name: miden-testnet-bridge

services:
  bridge:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      miden-node:
        condition: service_healthy
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/miden_bridge}
      MIDEN_RPC_URL: ${MIDEN_RPC_URL:-https://rpc.testnet.miden.io}
      MIDEN_REMOTE_PROVER_URL: ${MIDEN_REMOTE_PROVER_URL:-}
      MIDEN_REMOTE_PROVER_TIMEOUT_SECS: ${MIDEN_REMOTE_PROVER_TIMEOUT_SECS:-180}
      MIDEN_STORE_DIR: ${MIDEN_STORE_DIR:-/var/lib/bridge/miden-store}
      MIDEN_MASTER_SEED_HEX: ${MIDEN_MASTER_SEED_HEX:?MIDEN_MASTER_SEED_HEX is required}
      EVM_RPC_URL: ${EVM_RPC_URL:-https://gateway.tenderly.co/public/sepolia}
      MASTER_MNEMONIC: ${MASTER_MNEMONIC:-abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about}
      SOLVER_PRIVATE_KEY: ${SOLVER_PRIVATE_KEY:?SOLVER_PRIVATE_KEY is required}
      EVM_CHAIN_ID: ${EVM_CHAIN_ID:-11155111}
      EVM_TOKEN_ADDRESSES_PATH: ${EVM_TOKEN_ADDRESSES_PATH:-/state/token-addresses.json}
      EVM_REQUIRED_CONFIRMATIONS: ${EVM_REQUIRED_CONFIRMATIONS:-2}
      EVM_DEPOSIT_SCAN_LOOKBACK_BLOCKS: ${EVM_DEPOSIT_SCAN_LOOKBACK_BLOCKS:-}
      AGGLAYER_BRIDGE_ADDRESS: ${AGGLAYER_BRIDGE_ADDRESS:-0x1348947e282138d8f377b467f7d9c2eb0f335d1f}
      AGGLAYER_DEST_NETWORK: ${AGGLAYER_DEST_NETWORK:-76}
      AGGLAYER_DEST_L1_NETWORK: ${AGGLAYER_DEST_L1_NETWORK:-0}
      AGGLAYER_L2_CHAIN_ID: ${AGGLAYER_L2_CHAIN_ID:-1022211914}
      AGGLAYER_MIDEN_BRIDGE_ID: ${AGGLAYER_MIDEN_BRIDGE_ID:-mcst1arychvrurzxdy5qwz0mg5p5umsvsepyx}
      AGGLAYER_MIDEN_FAUCET_ID: ${AGGLAYER_MIDEN_FAUCET_ID:-mcst1arnrhfau9svl7cpu2tr8lfzzd5j87wwe}
      AGGLAYER_BRIDGE_SERVICE_API: ${AGGLAYER_BRIDGE_SERVICE_API:-https://miden-testnet-bridge.dev.eu-north-3.gateway.fm/api}
      AGGLAYER_MIDEN_NODE_URL: ${AGGLAYER_MIDEN_NODE_URL:-https://rpc.testnet.miden.io:443}
      AGGLAYER_SEPOLIA_RPC_URL: ${AGGLAYER_SEPOLIA_RPC_URL:-https://ethereum-sepolia-rpc.publicnode.com}
      AGGLAYER_GAS_TOKEN_ADDRESS: ${AGGLAYER_GAS_TOKEN_ADDRESS:-0x0000000000000000000000000000000000000000}
      AGGLAYER_GAS_LIMIT: ${AGGLAYER_GAS_LIMIT:-300000}
      AGGLAYER_FORCE_UPDATE_GLOBAL_EXIT_ROOT: ${AGGLAYER_FORCE_UPDATE_GLOBAL_EXIT_ROOT:-true}
      BRIDGE_HTTP_PORT: ${BRIDGE_HTTP_PORT:-8080}
      BRIDGE_PROFILE: sepolia
      BRIDGE_DEMO_ENABLED: ${BRIDGE_DEMO_ENABLED:-1}
      BRIDGE_UI_ENABLED: ${BRIDGE_UI_ENABLED:-1}
      BRIDGE_CORS_ALLOW_ORIGIN: ${BRIDGE_CORS_ALLOW_ORIGIN:-*}
      DEMO_EVM_FUNDED_PRIVATE_KEY: ${DEMO_EVM_FUNDED_PRIVATE_KEY:-}
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn,hyper=warn,tower_http=warn}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # Forward BRIDGE_PRICER through from the caller (e2e harness sets =mock;
      # production leaves it unset for the CoinGecko default).
      BRIDGE_PRICER: ${BRIDGE_PRICER:-}
    ports:
      - "${BRIDGE_HTTP_PORT:-8080}:8080"
    volumes:
      - sepolia-token-state:/state:ro
      - bridge-miden-store:/var/lib/bridge/miden-store
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      # Bridge bootstrap submits multiple Miden testnet transactions
      # (solver deploy, faucet deploys, solver liquidity). Remote proving
      # removes the local prover cost, but testnet confirmation still needs
      # a longer startup window.
      start_period: 300s

  lab-ui:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      BRIDGE_API_BASE: ${LAB_UI_BRIDGE_API_BASE:-http://bridge:8080}
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: 3000
    ports:
      - "${LAB_UI_HTTP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  miden-node:
    profiles: ["local-node"]
    build:
      context: .
      dockerfile: Dockerfile.miden-node
      args:
        MIDEN_NODE_REF: v0.14.10
    image: miden-node-local:v0.14.10
    command: ["/bin/bash", "/scripts/miden_node_start.sh"]
    depends_on:
      miden-node-genesis:
        condition: service_completed_successfully
    ports:
      - "57291:57291"
    volumes:
      - miden-node-data:/var/lib/miden/data
      - miden-node-accounts:/var/lib/miden/accounts
      - ./scripts/miden_node_start.sh:/scripts/miden_node_start.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 57291"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  miden-node-genesis:
    profiles: ["genesis", "local-node"]
    build:
      context: .
      dockerfile: Dockerfile.miden-node
      args:
        MIDEN_NODE_REF: v0.14.10
    image: miden-node-local:v0.14.10
    command: ["/bin/bash", "/scripts/miden_node_genesis.sh"]
    restart: "no"
    volumes:
      - miden-node-data:/var/lib/miden/data
      - miden-node-accounts:/var/lib/miden/accounts
      - ./scripts/miden_node_genesis.sh:/scripts/miden_node_genesis.sh:ro

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: miden_bridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d miden_bridge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  bridge-miden-store:
  miden-node-accounts:
  miden-node-data:
  postgres-data:
  sepolia-token-state:
