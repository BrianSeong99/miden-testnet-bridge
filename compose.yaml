name: miden-testnet-bridge

services:
  bridge:
    build:
      context: .
    depends_on:
      anvil:
        condition: service_healthy
      anvil-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      miden-node:
        condition: service_healthy
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/miden_bridge}
      MIDEN_RPC_URL: ${MIDEN_RPC_URL:-https://rpc.testnet.miden.io}
      MIDEN_REMOTE_PROVER_URL: ${MIDEN_REMOTE_PROVER_URL:-}
      MIDEN_REMOTE_PROVER_TIMEOUT_SECS: ${MIDEN_REMOTE_PROVER_TIMEOUT_SECS:-10}
      MIDEN_STORE_DIR: ${MIDEN_STORE_DIR:-/var/lib/bridge/miden-store}
      MIDEN_MASTER_SEED_HEX: ${MIDEN_MASTER_SEED_HEX:-0101010101010101010101010101010101010101010101010101010101010101}
      EVM_RPC_URL: ${EVM_RPC_URL:-http://anvil:8545}
      MASTER_MNEMONIC: ${MASTER_MNEMONIC:-abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about}
      SOLVER_PRIVATE_KEY: ${SOLVER_PRIVATE_KEY:-0x59c6995e998f97a5a0044966f0945382dbb7d2745078b2336b91c60d50d6b6d7}
      EVM_CHAIN_ID: ${EVM_CHAIN_ID:-271828}
      EVM_TOKEN_ADDRESSES_PATH: ${EVM_TOKEN_ADDRESSES_PATH:-/state/token-addresses.json}
      BRIDGE_HTTP_PORT: ${BRIDGE_HTTP_PORT:-8080}
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn,hyper=warn,tower_http=warn}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # Forward BRIDGE_PRICER through from the caller (e2e harness sets =mock;
      # production leaves it unset for the CoinGecko default).
      BRIDGE_PRICER: ${BRIDGE_PRICER:-}
    ports:
      - "${BRIDGE_HTTP_PORT:-8080}:8080"
    volumes:
      - anvil-state:/state:ro
      - bridge-miden-store:/var/lib/bridge/miden-store
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      # Bridge bootstrap submits multiple Miden testnet transactions
      # (solver deploy, faucet deploys, solver liquidity). Remote proving
      # removes the local prover cost, but testnet confirmation still needs
      # a longer startup window.
      start_period: 300s

  miden-node:
    profiles: ["local-node"]
    build:
      context: .
      dockerfile: Dockerfile.miden-node
      args:
        MIDEN_NODE_REF: v0.14.10
    image: miden-node-local:v0.14.10
    command: ["/bin/bash", "/scripts/miden_node_start.sh"]
    depends_on:
      miden-node-genesis:
        condition: service_completed_successfully
    ports:
      - "57291:57291"
    volumes:
      - miden-node-data:/var/lib/miden/data
      - miden-node-accounts:/var/lib/miden/accounts
      - ./scripts/miden_node_start.sh:/scripts/miden_node_start.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 57291"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  miden-node-genesis:
    profiles: ["genesis", "local-node"]
    build:
      context: .
      dockerfile: Dockerfile.miden-node
      args:
        MIDEN_NODE_REF: v0.14.10
    image: miden-node-local:v0.14.10
    command: ["/bin/bash", "/scripts/miden_node_genesis.sh"]
    restart: "no"
    volumes:
      - miden-node-data:/var/lib/miden/data
      - miden-node-accounts:/var/lib/miden/accounts
      - ./scripts/miden_node_genesis.sh:/scripts/miden_node_genesis.sh:ro

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["/bin/sh", "/bootstrap/anvil_start.sh"]
    ports:
      - "8545:8545"
    volumes:
      - anvil-state:/state
      - ./scripts/anvil_start.sh:/bootstrap/anvil_start.sh:ro
      - ./scripts/anvil_bootstrap.sh:/bootstrap/anvil_bootstrap.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "cast rpc eth_blockNumber --rpc-url http://localhost:8545 | tr -d '\"' | grep -Eq '^0x[0-9a-fA-F]+$'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 3s

  anvil-init:
    image: ghcr.io/foundry-rs/foundry:latest
    user: root
    entrypoint: ["/bin/bash", "/bootstrap/anvil_bootstrap.sh"]
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      RPC_URL: http://anvil:8545
      STATE_DIR: /state
      PROJECT_ROOT: /workspace
      SOLVER_PRIVATE_KEY: ${SOLVER_PRIVATE_KEY:-0x59c6995e998f97a5a0044966f0945382dbb7d2745078b2336b91c60d50d6b6d7}
    volumes:
      - anvil-state:/state
      - ./scripts/anvil_bootstrap.sh:/bootstrap/anvil_bootstrap.sh:ro
      - ./contracts:/workspace/contracts:ro
      - ./foundry.toml:/workspace/foundry.toml:ro

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: miden_bridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d miden_bridge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  anvil-state:
  bridge-miden-store:
  miden-node-accounts:
  miden-node-data:
  postgres-data:
